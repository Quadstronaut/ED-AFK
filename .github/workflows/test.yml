name: ed-autojump tests

on:
  push:
    branches: [main]
    paths:
      - 'projects/ed-autojump/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'projects/ed-autojump/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    name: pytest py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: projects/ed-autojump

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: projects/ed-autojump/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        # @requires_game tests are deselected by pyproject.toml addopts.
        # Recorded-session regression suite skips cleanly with no fixtures.
        run: pytest -v
