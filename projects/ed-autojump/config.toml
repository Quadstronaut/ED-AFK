[ship]
expected_ship = "cutter"
expected_max_jump_range_ly = 31.288
expected_fuel_capacity_t = 64.0

[routing]
mode = "external_spansh"
destination = "Beagle Point"
efficiency = 60
range_margin = 0.97
fuel_safety_threshold = 0.20
refuel_threshold = 0.70

[exploration]
honk = true
fss = "off"
dss = "off"

[safety]
hull_panic_threshold = 0.70
heat_panic_threshold = 1.00
heatsink_threshold = 0.80
no_journal_timeout_s = 90.0
panic_hotkey = "ctrl+alt+p"
engagement_debounce_timeout_s = 30.0  # seconds before a stalled jump-charge clears the debounce flag and retries

[input]
backend = "pydirectinput"
key_delay_ms = 75
pitch_up_default_s = 2.0

[binds]
preset_name = "ED-AFK"
auto_swap_start_preset = true
restore_on_exit = true

[hud]
edhm_detect = true
graphics_override_fallback = true

[cv]
capture_backend = "dxcam-cpp"
require_sdr = true
require_borderless_windowed = true
target_resolution = [2560, 1440]
ocr_engine = "tesseract"

[eddn]
publish = true
software_name = "ED-AFK / ed-autojump"
software_version = "0.2.0"

[menu_nav]
enabled = true
group_owner_commander = "Quadstronaut"

[menu_nav.calibration.Duvrazh]
continue_key = "space"
pg_nav_direction = "right"
pg_nav_count = 1
group_nav_direction = "down"
group_nav_count = 3

[vision]
# Nav-compass alignment (orient the ship at the next target before jumping).
# backend: "cyan" (finds the cyan target dot; ring-centered so it tolerates
# head-sway -- validated on this machine) | "yolo-onnx" (EDAP model; did NOT
# recognise this compass) | "ultralytics" | "opencv" (colour-free, WIP).
# capture_backend: "gdi" (default; dxcam returns black on this machine) | "dxcam".
enabled = true
backend = "cyan"
capture_backend = "gdi"
# Compass screen rect (x, y, w, h). Calibrated 2026-05-24 on the 1920x1080
# primary; generous box centred on the compass (~746,860) to allow drift.
region = [676, 790, 140, 140]
compass_radius = 25.0          # fallback radius; ring detection overrides it live
align_tol = 0.15               # dot within 15% of centre = aligned (validated 2026-05-24)
deadzone = 0.10                # ignore sub-10% offsets -- don't chase sub-dot noise
timeout_s = 45.0               # give up aligning after this; then skip the jump
settle_s = 1.4                 # wait after key release; ship momentum decays ~1-1.5 s; 1.4s safe margin
align_samples = 7              # median of 7 reads robustly rejects transient cyan-UI spikes

[escape]
# Arrival + startup behaviour: how the ship gets off the star.
#   "compass" (DEFAULT) — target the star (Select Target Ahead), use the nav-
#     compass to PITCH it under the ship, then fly clear, target the next hop,
#     and orient. NO brightness; never throttles while the star is ahead (a
#     failed pitch bails without throttle). Needs [vision] on + a calibrated
#     compass region (both set above). The jump fires from the engage gate.
#   "brightness" — vision-sensed: pitch the bright star off the top-2/3 of the
#     screen, accelerate, then compass-align.
#   "refuel" (DEPRECATED — WRONG: Supercruise Assist rams the star). Do not use.
#   "sc_assist" / "blind" — legacy.
escape_mode = "compass"
# compass-mode knobs (defaults shown). "under us" = the star's compass dot is
# below the nose (offset_y <= -compass_clear_offset_y) OR hollow (behind us).
compass_clear_offset_y = 0.6   # how far below centre the star dot must sit to count as "under us"
compass_pitch_hold_s = 1.0     # PitchUpButton hold per iteration (hard, sustained)
compass_pitch_settle_s = 1.0   # wait after each pitch for rotational momentum to settle before re-reading
compass_max_iters = 20         # max pitch presses before bailing (a bail NEVER throttles)
compass_timeout_s = 30.0       # abort the pitch-under after this many seconds
compass_fly_clear_s = 7.0      # seconds flying away from the star before targeting the next hop
# refuel knobs (DEPRECATED mode). approach_throttle is the ONE live-tune knob —
# how hard to close on the star before the scoop-rate plateau cuts the throttle.
refuel_approach_throttle = "SetSpeed75"
refuel_orbit_s = 3.0            # seconds on SC-assist orbit before cancelling it
refuel_post_depart_wait_s = 7.0  # seconds clear of the star before orienting
refuel_rate_epsilon = 0.05     # Scooped-rate plateau tolerance (tonnes)
# smack recovery: emergency drop INTO the star (SupercruiseExit BodyType:Star).
smack_recovery = true
smack_cooldown_s = 50.0        # wait before re-triggering FSD (~45 s cooldown + margin)
smack_post_sc_wait_s = 7.0     # seconds in supercruise before targeting the next hop
# brightness-mode tunables (only used when escape_mode = "brightness").
sun_bright_thresh = 125     # grayscale pixel value threshold
sun_present_frac = 0.02     # bright fraction above which a star IS present
sun_clear_frac = 0.005      # bright fraction below which the star is "completely gone"
sun_pitch_hold_s = 1.0      # PitchUpButton hold per iteration — HARD sustained pitch
sun_timeout_s = 20.0        # abort the pitch-clear after this many seconds
# Region to probe for star brightness: (x, y, w, h).
# (0, 0, 0, 0) = auto-compute the TOP 2/3 of the primary screen at runtime.
sun_region = [0, 0, 0, 0]
# Fly-clear phase (brightness mode): after the star clears, fly AWAY before turning.
clear_throttle = "SetSpeed100"  # throttle action while flying clear (full ahead)
clear_s = 8.0                   # seconds to fly away from the star
clear_reenter_frac = 0.20       # if brightness exceeds this fraction mid-clear, pitch up again
clear_step_s = 0.5              # poll/step interval during the clear phase (seconds)

[nav]
# Press TargetNextRouteSystem (H) before each engage so the next route star
# is locked without nav-panel scrolling -- also gives the compass a target
# to align to. Disable if your build cycles the route target forward on each
# press (verify in flight).
retarget_route_before_engage = true
# Supercruise Assist (throttle-mode). OFF until the docking/orbit flow lands.
# PREREQUISITE: ED has NO keybind for SC Assist, so the bot can't toggle it
# with a key. To use it you must set, in ED's right panel / flight settings,
# Supercruise Assist to engage on blue-zone throttle. Then engaging = locking
# a target + throttling into the blue zone (sc_assist_throttle_action).
supercruise_assist = false
sc_assist_throttle_action = "SetSpeed75"